<!DOCTYPE html>

<html lang="sv"><head><meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
  
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quiz</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: sans-serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; background: #f5f4f0; }
    .card { background: #fff; border: 1px solid rgba(0,0,0,0.12); border-radius: 16px; padding: 2rem; max-width: 420px; width: 100%; }
    h2 { font-size: 18px; font-weight: 500; margin-bottom: 1.5rem; line-height: 1.5; color: #111; }
    .options { display: flex; flex-direction: column; gap: 10px; }
    .opt { background: transparent; border: 1px solid rgba(0,0,0,0.2); border-radius: 10px; padding: 12px 16px; font-size: 15px; text-align: left; cursor: pointer; color: #111; transition: background 0.15s; }
    .opt:hover:not(:disabled) { background: #f0efe9; }
    .opt:disabled { cursor: default; }
    .opt.correct { background: #eaf3de; border-color: #639922; color: #27500a; }
    .opt.wrong { background: #fcebeb; border-color: #e24b4a; color: #501313; }
    .bra-wrapper { display: none; flex-direction: column; align-items: center; gap: 8px; margin-top: 1.5rem; }
    .bra-wrapper.show { display: flex; }
    .bra-text { font-size: 28px; font-weight: 500; color: #3b6d11; opacity: 0; transform: scale(0.6) translateY(10px); transition: opacity 0.4s ease, transform 0.4s cubic-bezier(0.34,1.56,0.64,1); }
    .bra-text.pop { opacity: 1; transform: scale(1) translateY(0); }
    .stars { display: flex; gap: 6px; }
    .star { font-size: 22px; opacity: 0; transform: scale(0.4); transition: opacity 0.3s ease, transform 0.3s cubic-bezier(0.34,1.56,0.64,1); }
    .star.pop { opacity: 1; transform: scale(1); }
    .try-again { margin-top: 0.75rem; background: transparent; border: 1px solid rgba(0,0,0,0.2); border-radius: 8px; padding: 8px 16px; font-size: 13px; cursor: pointer; color: #555; }
    .try-again:hover { background: #f0efe9; }
  </style>
</head>
<body>
  <div class="card">
    <h2>Vilket år grundades staden Stockholm?</h2>
    <div class="options" id="opts">
      <button class="opt" data-correct="false">1152</button>
      <button class="opt" data-correct="true">1252</button>
      <button class="opt" data-correct="false">1352</button>
      <button class="opt" data-correct="false">1452</button>
    </div>
    <div class="bra-wrapper" id="bra">
      <div class="bra-text" id="braText">Bra! ✓</div>
      <div class="stars">
        <div class="star" id="s1">⭐</div>
        <div class="star" id="s2">⭐</div>
        <div class="star" id="s3">⭐</div>
      </div>
      <button class="try-again" id="tryAgain">Försök igen</button>
    </div>
  </div>
  <script>
    (function() {
      document.getElementById('opts').addEventListener('click', function(e) {
        var btn = e.target.closest('.opt');
        if (!btn || btn.disabled) return;
        var correct = btn.getAttribute('data-correct') === 'true';
        document.querySelectorAll('.opt').forEach(function(b) { b.disabled = true; });
        btn.classList.add(correct ? 'correct' : 'wrong');
        if (correct) {
          var wrap = document.getElementById('bra');
          wrap.classList.add('show');
          setTimeout(function() { document.getElementById('braText').classList.add('pop'); }, 50);
          setTimeout(function() { document.getElementById('s1').classList.add('pop'); }, 300);
          setTimeout(function() { document.getElementById('s2').classList.add('pop'); }, 480);
          setTimeout(function() { document.getElementById('s3').classList.add('pop'); }, 650);
        }
      });

      document.getElementById('tryAgain').addEventListener('click', function() {
        document.querySelectorAll('.opt').forEach(function(b) { b.disabled = false; b.className = 'opt'; });
        var wrap = document.getElementById('bra');
        wrap.classList.remove('show');
        document.getElementById('braText').classList.remove('pop');
        ['s1','s2','s3'].forEach(function(id) { document.getElementById(id).classList.remove('pop'); });
      });
    })();
  </script>


</body></html>
